services:
  frontend:
    build:
      context: .
      args:
        # Override with: VITE_API_BASE_URL=https://... docker compose up --build
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    ports:
      - "80:80"
    restart: unless-stopped
    # If your backend runs in a separate compose project, attach it to a shared network:
    # networks:
    #   - app-network

  # Dev server with hot module replacement — runs Vite directly, no build step.
  # Usage: docker compose run --rm --service-ports frontend-dev
  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules   # prevent host node_modules from bleeding in
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
