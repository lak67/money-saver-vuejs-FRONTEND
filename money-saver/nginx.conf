server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router — fall back to index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container.
    # Using a variable forces per-request DNS resolution so nginx starts even
    # if the backend isn't up yet. Change "backend" to your service name.
    location /api {
        resolver 127.0.0.11 valid=10s;  # Docker's internal DNS
        set $upstream http://backend:8080;
        proxy_pass $upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
